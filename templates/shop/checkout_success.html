<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Complete — CardPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080c12;--surface:#0e1420;--border:#1e2d45;--accent:#00d4ff;--gold:#ffd166;--text:#e8f0fe;--success:#00e5a0;--muted:#6b7fa3;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .box{background:var(--surface);border:1px solid rgba(0,229,160,0.2);border-radius:20px;padding:3rem 2.5rem;max-width:480px;text-align:center;box-shadow:0 0 60px rgba(0,229,160,0.08);}
    .check{font-size:3.5rem;margin-bottom:1rem;}
    h1{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:2px;color:var(--success);margin-bottom:0.5rem;}
    p{color:var(--muted);font-size:0.95rem;line-height:1.6;margin-bottom:1.5rem;}
    a{display:inline-block;background:linear-gradient(135deg,var(--accent),#0099cc);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;padding:0.7rem 2rem;border-radius:8px;text-decoration:none;}
  </style>
</head>
<body>
<div class="box">
  <div class="check">✅</div>
  <h1>Order Complete!</h1>
  <p>Your payment was successful. The shop will be in touch to arrange shipping. Thank you for shopping on CardPulse!</p>
  <a href="/">Back to CardPulse</a>
</div>
</body>
</html>
